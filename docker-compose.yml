version: '3.8'

services:
  # Backend - FastAPI
  api:
    build: ./backend
    container_name: ai-summarizer-api
    ports:
      - "8000:8000"
    # env_file loads the defaults, but 'environment' overrides them for Docker
    env_file:
      - backend/.env
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    networks:
      - summarizer-network

  # Frontend - Streamlit
  frontend:
    build: ./frontend
    container_name: ai-summarizer-frontend
    ports:
      - "8501:8501"
    env_file:
      - frontend/.env
    depends_on:
      - api
    networks:
      - summarizer-network

networks:
  summarizer-network:
    driver: bridge

# Note: The 'ollama' service and 'volumes' are removed to use the Mac Native App